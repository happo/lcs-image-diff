name: Automerge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: fastify/github-action-merge-dependabot@4ed43935e3bd362966dfb1e0829f9a35638fe6eb # v3.13.0
        with:
          merge-method: 'merge'
          target: 'minor'
          use-github-auto-merge: true
